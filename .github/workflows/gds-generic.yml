name: Generate GDSII (generic)

# Standalone-macro flow (NO TinyTapeout harness). Hardens the user's module
# directly with OpenLane and places the I/O pins on the sides the user chose
# (via FP_PIN_ORDER_CFG), so the design keeps its own custom pinout. Isolated
# from gds.yml — it cannot affect the TinyTapeout flow.
#
# OpenLane runs via `docker run` (not a container job) so the runner's JS
# actions (checkout/upload-artifact) keep working with host Node.
#
# Reads:  projects/<project_id>/<module>.v  and  projects/<project_id>/pin_order.cfg
# Emits:  artifact gdsii-generic-<module> with the .gds (+ render if available).

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID'
        required: true
      module_name:
        description: 'Top module name'
        required: true
      clock_port:
        description: 'Clock port name (empty for combinational designs)'
        required: false
        default: 'clk'
      die_um:
        description: 'Square die size in microns (absolute floorplan; keeps small designs large enough for the PDN)'
        required: false
        default: '100'

jobs:
  gds:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble OpenLane design
        run: |
          PID="${{ github.event.inputs.project_id }}"
          MOD="${{ github.event.inputs.module_name }}"
          CLK="${{ github.event.inputs.clock_port }}"
          SRC="projects/${PID}/${MOD}.v"
          PINCFG="projects/${PID}/pin_order.cfg"
          test -f "$SRC" || { echo "::error::missing $SRC"; exit 1; }

          mkdir -p design/src
          cp "$SRC" design/src/
          if [ -f "$PINCFG" ]; then cp "$PINCFG" design/pin_order.cfg; else echo "" > design/pin_order.cfg; fi

          python3 - "$MOD" "$CLK" "${{ github.event.inputs.die_um }}" <<'PYEOF'
          import json, sys
          mod, clk = sys.argv[1], sys.argv[2]
          die = float(sys.argv[3] or "100")
          # Grow the die so the big square bond pads (≈70um) fit around the
          # perimeter: count pins per side from pin_order.cfg and reserve room.
          SECT = {"#N", "#E", "#S", "#W"}
          per = {"#N": 0, "#E": 0, "#S": 0, "#W": 0}
          cur = None
          try:
            for raw in open("design/pin_order.cfg"):
              l = raw.strip()
              if l in SECT: cur = l
              elif l and cur: per[cur] += 1
          except OSError:
            pass
          max_side = max(per.values()) if per else 0
          pad_min = max_side * 120.0 + 160.0  # ~70um pad + 50um gap + margins
          die = max(die, pad_min, 120.0)
          cfg = {
            "DESIGN_NAME": mod,
            "VERILOG_FILES": ["dir::src/*.v"],
            "FP_PIN_ORDER_CFG": "dir::pin_order.cfg",
            # Absolute floorplan so tiny educational designs stay large enough
            # for the power-distribution network (avoids PDN-0185).
            "FP_SIZING": "absolute",
            "DIE_AREA": [0, 0, die, die],
            "PL_TARGET_DENSITY_PCT": 35,
            "PDK": "sky130A",
            "QUIT_ON_SYNTH_CHECKS": False,
            "RUN_KLAYOUT_XOR": False,
            "RUN_MAGIC_DRC": False,
            "CLOCK_PERIOD": 20.0,
          }
          if clk.strip():
            cfg["CLOCK_PORT"] = clk.strip()
          else:
            cfg["CLOCK_PORT"] = ""
          json.dump(cfg, open("design/config.json", "w"), indent=2)
          print(open("design/config.json").read())
          print("---- pin_order.cfg ----"); print(open("design/pin_order.cfg").read())
          PYEOF

      # Cache the sky130 PDK across runs so production never depends on the
      # flaky upstream PDK download. Once one run populates it, every later run
      # reads it from cache (no network) — the durable fix for the Vercel+GitHub
      # production setup.
      - name: Cache sky130 PDK
        uses: actions/cache@v4
        with:
          path: .pdk
          key: pdk-sky130A-openlane2-2.3.10-v1

      # Maximum-robustness PDK source under our control: if the cache is empty,
      # restore the PDK from a vendored GitHub Release asset (this repo). Only
      # falls through to OpenLane's upstream download if neither exists.
      - name: Restore vendored PDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .pdk
          if [ -z "$(ls -A .pdk 2>/dev/null)" ]; then
            if gh release download pdk-vendor -R ${{ github.repository }} -p sky130-pdk.tar.zst -O pdk.tar.zst 2>/dev/null; then
              tar -C .pdk -I zstd -xf pdk.tar.zst && echo "PDK restored from vendored release"
            else
              echo "no vendored PDK release yet — OpenLane will resolve it once, then we vendor it"
            fi
          else
            echo "PDK present from cache"
          fi

      - name: Run OpenLane (docker)
        run: |
          mkdir -p .pdk
          # PDK_ROOT points at the cached volume; OpenLane/ciel reuses it.
          # Retry the OpenLane step to ride out a transient first-time fetch.
          attempt=0
          until [ $attempt -ge 3 ]; do
            attempt=$((attempt+1))
            echo "::group::OpenLane attempt $attempt"
            if docker run --rm \
                 -e PDK_ROOT=/pdk \
                 -v "$PWD/.pdk":/pdk \
                 -v "$PWD/design":/work -w /work \
                 ghcr.io/efabless/openlane2:2.3.10 \
                 openlane --log-level INFO config.json; then
              echo "::endgroup::"; echo "OpenLane succeeded on attempt $attempt"; break
            fi
            echo "::endgroup::"; echo "attempt $attempt failed; retrying…"; sleep 15
          done
          sudo chmod -R a+rX design .pdk || true

      # Vendor the resolved PDK to a GitHub Release (once) so future runs — and
      # production — never depend on the flaky upstream PDK download again.
      - name: Vendor PDK to release (once)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -z "$(ls -A .pdk 2>/dev/null)" ]; then echo "no PDK to vendor"; exit 0; fi
          if ! gh release view pdk-vendor -R ${{ github.repository }} >/dev/null 2>&1; then
            gh release create pdk-vendor -R ${{ github.repository }} -t "Vendored sky130 PDK (OpenLane2 2.3.10)" -n "Cached PDK for reproducible, network-independent OpenLane runs." || true
          fi
          HAS=$(gh release view pdk-vendor -R ${{ github.repository }} --json assets -q '.assets[].name' 2>/dev/null | grep -c 'sky130-pdk.tar.zst' || true)
          if [ "$HAS" = "0" ]; then
            echo "vendoring PDK to release…"
            tar -C .pdk -I 'zstd -19 -T0' -cf sky130-pdk.tar.zst .
            gh release upload pdk-vendor -R ${{ github.repository }} sky130-pdk.tar.zst || true
            echo "PDK vendored ($(du -h sky130-pdk.tar.zst | cut -f1))"
          else
            echo "PDK already vendored"
          fi
          # Verify a GDS exists; if not, fail.
          RUN=$(ls -dt design/runs/*/ 2>/dev/null | head -1 || true)
          test -n "$RUN" && find "$RUN/final/gds" -name '*.gds' | head -1 | grep -q . || { echo "::error::OpenLane produced no GDS after retries"; exit 1; }

      - name: Stamp square bond pads
        run: |
          MOD="${{ github.event.inputs.module_name }}"
          mkdir -p out
          RUN=$(ls -dt design/runs/*/ | head -1)
          GDS=$(find "$RUN/final/gds" -name '*.gds' 2>/dev/null | head -1 || true)
          if [ -z "$GDS" ]; then echo "::error::no GDS produced"; find "$RUN/final" -maxdepth 2 -type d || true; exit 1; fi
          pip install --quiet gdstk
          # Add wire-bondable square pads per the chosen pinout sides.
          python3 stamp_pads.py "$GDS" "out/${MOD}.gds" design/pin_order.cfg 70 || cp "$GDS" "out/${MOD}.gds"
          ls -la out

      - name: Upload GDSII
        uses: actions/upload-artifact@v4
        with:
          name: gdsii-generic-${{ github.event.inputs.module_name }}
          path: out/
          retention-days: 30

# OpenCores verification mesh — GitHub Actions workflow
# =============================================================================
# Triggered by lib/verification/cloud-runner.ts from the Vercel app.
#
# Layout convention: the app uploads RTL into projects/verify-<design_id>/
# before dispatching this workflow. The optional testbench is at tb.v in
# the same directory. The workflow runs the requested subset of agents,
# writes a verification.json that matches lib/verification/types.ts ->
# VerificationReport, and uploads it as a single artifact the app polls
# for. Anything more elaborate than that breaks the contract.
# =============================================================================

name: verify

on:
  workflow_dispatch:
    inputs:
      design_id:
        description: "slug (always starts with verify-)"
        required: true
        type: string
      top_module:
        description: "Top Verilog module"
        required: true
        type: string
      pdk:
        description: "Target PDK"
        required: true
        type: choice
        options: [sky130, gf180mcu, sg13g2]
      agents:
        description: "Comma-separated subset (lint,sim,corner,coverage,sta,drc-lvs)"
        required: true
        default: "lint,sim,corner,coverage"
        type: string
      synthesis_run_id:
        description: "Synthesis run id (post-GDSII pass only)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  verify:
    name: "${{ inputs.design_id }} (${{ inputs.agents }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      DESIGN_ID: ${{ inputs.design_id }}
      TOP: ${{ inputs.top_module }}
      PDK: ${{ inputs.pdk }}
      AGENTS: ${{ inputs.agents }}
      SYNTH_RUN_ID: ${{ inputs.synthesis_run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Toolchain
      # ---------------------------------------------------------------------
      # Verilator 5 ships in Ubuntu 24.04 but not 22.04, so we build it
      # ourselves. Icarus is fine from apt. OpenSTA + Magic + netgen come
      # from the openroad/flow-scripts container which we mount as a side
      # step only when sta / drc-lvs are requested.
      - name: Install Icarus + build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            iverilog git make g++ python3 python3-pip \
            autoconf flex bison help2man perl libfl2 libfl-dev zlib1g zlib1g-dev \
            ca-certificates jq

      - name: Cache Verilator 5
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: /opt/verilator
          key: verilator-5.026-ubuntu22

      - name: Build Verilator 5
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          git clone --branch v5.026 --depth 1 https://github.com/verilator/verilator.git /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix=/opt/verilator
          make -j"$(nproc)"
          sudo make install

      - name: Add Verilator to PATH
        run: echo "/opt/verilator/bin" >> "$GITHUB_PATH"

      - name: Print tool versions
        run: |
          verilator --version
          iverilog -V | head -n 1

      # ---------------------------------------------------------------------
      # Stage the design
      # ---------------------------------------------------------------------
      - name: Stage design files
        id: stage
        run: |
          set -euo pipefail
          src="projects/${DESIGN_ID}"
          if [ ! -d "$src" ]; then
            echo "::error::Design directory $src not found in repo"
            exit 1
          fi
          mkdir -p work
          cp -r "$src"/. work/
          ls -la work
          # Comma-split the agents list so later steps can probe it cheaply.
          echo "agents_csv=,${AGENTS},"  >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # Pre-GDSII agents
      # ---------------------------------------------------------------------
      - name: Lint (Verilator)
        if: contains(steps.stage.outputs.agents_csv, ',lint,')
        id: agent_lint
        continue-on-error: true
        working-directory: work
        run: |
          set -euo pipefail
          rtl=$(ls *.v | grep -v '^tb\.v$' || true)
          if [ -z "$rtl" ]; then
            echo "::warning::No RTL files staged"
            exit 1
          fi
          set +e
          verilator --lint-only -Wall --top-module "$TOP" $rtl 2> lint.err
          ec=$?
          set -e
          # Parse %Error/%Warning lines into the diagnostics shape the app
          # expects. Verilator emits to stderr.
          python3 ../scripts/parse_lint.py lint.err "$ec" > ../lint.json

      - name: Sim (Icarus + vvp)
        if: contains(steps.stage.outputs.agents_csv, ',sim,')
        id: agent_sim
        continue-on-error: true
        working-directory: work
        run: |
          set -euo pipefail
          if [ ! -f tb.v ]; then
            printf '%s\n' '{"agent":"sim","pass":false,"diagnostics":[],"suggestedFixes":[],"artifacts":[],"metrics":{},"durationMs":0,"skipped":true,"skipReason":"no testbench supplied"}' > ../sim.json
            exit 0
          fi
          rtl=$(ls *.v | grep -v '^tb\.v$')
          set +e
          iverilog -g2012 -o sim.out $rtl tb.v 2> sim_compile.err
          comp_ec=$?
          set -e
          if [ $comp_ec -ne 0 ]; then
            python3 ../scripts/parse_sim.py sim_compile.err "$comp_ec" compile > ../sim.json
            exit 0
          fi
          set +e
          vvp sim.out > sim_run.log 2>&1
          run_ec=$?
          set -e
          python3 ../scripts/parse_sim.py sim_run.log "$run_ec" runtime > ../sim.json

      - name: Corner (Icarus + template stimulus)
        if: contains(steps.stage.outputs.agents_csv, ',corner,')
        id: agent_corner
        continue-on-error: true
        working-directory: work
        run: |
          set -euo pipefail
          # Reuse tb.v as the corner stimulus when present — the chat-side
          # examples are already shaped to probe boundary cases.
          if [ ! -f tb.v ]; then
            printf '%s\n' '{"agent":"corner","pass":false,"diagnostics":[],"suggestedFixes":[],"artifacts":[],"metrics":{},"durationMs":0,"skipped":true,"skipReason":"no testbench supplied; corner agent has no stimulus"}' > ../corner.json
            exit 0
          fi
          rtl=$(ls *.v | grep -v '^tb\.v$')
          set +e
          iverilog -g2012 -o corner.out $rtl tb.v 2> corner_compile.err
          comp_ec=$?
          set -e
          if [ $comp_ec -ne 0 ]; then
            python3 ../scripts/parse_sim.py corner_compile.err "$comp_ec" compile corner > ../corner.json
            exit 0
          fi
          set +e
          vvp corner.out > corner_run.log 2>&1
          run_ec=$?
          set -e
          python3 ../scripts/parse_sim.py corner_run.log "$run_ec" runtime corner > ../corner.json

      - name: Coverage (Verilator --binary --coverage)
        if: contains(steps.stage.outputs.agents_csv, ',coverage,')
        id: agent_coverage
        continue-on-error: true
        working-directory: work
        run: |
          set -euo pipefail
          if [ ! -f tb.v ]; then
            printf '%s\n' '{"agent":"coverage","pass":false,"diagnostics":[],"suggestedFixes":[],"artifacts":[],"metrics":{},"durationMs":0,"skipped":true,"skipReason":"no testbench supplied; coverage requires stimulus"}' > ../coverage.json
            exit 0
          fi
          rtl=$(ls *.v | grep -v '^tb\.v$')
          set +e
          verilator --binary --coverage -Wno-fatal --top-module tb $rtl tb.v 2> cov_build.err
          build_ec=$?
          set -e
          if [ $build_ec -ne 0 ]; then
            python3 ../scripts/parse_coverage.py "" "$build_ec" build > ../coverage.json
            exit 0
          fi
          ./obj_dir/Vtb > cov_run.log 2>&1 || true
          mkdir -p logs/coverage_annotated
          verilator_coverage --annotate logs/coverage_annotated coverage.dat > cov_summary.log 2>&1 || true
          python3 ../scripts/parse_coverage.py cov_summary.log 0 annotate > ../coverage.json

      # ---------------------------------------------------------------------
      # Post-GDSII agents (sta, drc-lvs)
      # ---------------------------------------------------------------------
      # These need the gate-level netlist + GDS from a prior synthesis run.
      # We pull them down from the corresponding synthesis workflow run
      # artifacts and hand them to OpenSTA / Magic / netgen.
      - name: Fetch synthesis artifacts
        if: ${{ inputs.synthesis_run_id != '' && (contains(steps.stage.outputs.agents_csv, ',sta,') || contains(steps.stage.outputs.agents_csv, ',drc-lvs,')) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p synth
          # The synthesis workflow is expected to upload a "synthesis-<top>"
          # artifact containing <top>.v (netlist) and <top>.gds. Tweak the
          # names below if your synthesis pipeline uses different ones.
          gh run download "$SYNTH_RUN_ID" -R "$GITHUB_REPOSITORY" -D synth || {
            echo "::warning::Could not download synthesis artifacts; STA/DRC-LVS will be skipped"
          }
          ls -la synth || true

      - name: STA (OpenSTA)
        if: contains(steps.stage.outputs.agents_csv, ',sta,')
        id: agent_sta
        continue-on-error: true
        run: |
          set -euo pipefail
          # Pull a prebuilt OpenSTA image instead of compiling from source.
          docker pull openroad/opensta:latest >/dev/null
          netlist=$(find synth -name "${TOP}.v" -o -name "${TOP}_netlist.v" | head -n1 || true)
          if [ -z "$netlist" ]; then
            printf '%s\n' '{"agent":"sta","pass":false,"diagnostics":[],"suggestedFixes":[],"artifacts":[],"metrics":{},"durationMs":0,"skipped":true,"skipReason":"no synthesized netlist available (synthesis_run_id missing or artifact not produced)"}' > sta.json
            exit 0
          fi
          # The PDK liberty paths follow the OpenROAD container's layout.
          case "$PDK" in
            sky130)    lib="/PDK/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__tt_025C_1v80.lib" ;;
            gf180mcu)  lib="/PDK/gf180mcuC/libs.ref/gf180mcu_fd_sc_mcu7t5v0/lib/gf180mcu_fd_sc_mcu7t5v0__tt_025C_5v00.lib" ;;
            *)         lib="" ;;
          esac
          {
            echo "read_liberty $lib"
            echo "read_verilog $netlist"
            echo "link_design $TOP"
            echo "create_clock -name clk -period 10 [get_ports clk]"
            echo "report_checks -path_delay max -format full_clock_expanded"
            echo "report_checks -path_delay min"
            echo "report_check_types -violators"
            echo "exit"
          } > sta.tcl
          set +e
          docker run --rm -v "$PWD:/work" -w /work openroad/opensta:latest sta -no_init sta.tcl > sta.log 2>&1
          sta_ec=$?
          set -e
          python3 scripts/parse_sta.py sta.log "$sta_ec" > sta.json

      - name: DRC + LVS (Magic + netgen)
        if: contains(steps.stage.outputs.agents_csv, ',drc-lvs,')
        id: agent_drclvs
        continue-on-error: true
        run: |
          set -euo pipefail
          gds=$(find synth -name "${TOP}.gds" | head -n1 || true)
          netlist=$(find synth -name "${TOP}.v" -o -name "${TOP}_netlist.v" | head -n1 || true)
          if [ -z "$gds" ] || [ -z "$netlist" ]; then
            printf '%s\n' '{"agent":"drc-lvs","pass":false,"diagnostics":[],"suggestedFixes":[],"artifacts":[],"metrics":{},"durationMs":0,"skipped":true,"skipReason":"GDS or netlist missing — run synthesis first"}' > drclvs.json
            exit 0
          fi
          docker pull efabless/openlane:latest >/dev/null
          # Build the magic script first so the inner heredoc doesn't have
          # to live inside the YAML block scalar (column-0 lines would
          # terminate the |-block).
          {
            echo "gds read $gds"
            echo "load $TOP"
            echo "drc check"
            echo "drc catchup"
            echo "drc count"
            echo "quit -noprompt"
          } > magic.tcl
          docker run --rm -v "$PWD:/w" -w /w efabless/openlane:latest bash -lc "magic -dnull -noconsole -rcfile /dev/null < magic.tcl > drc.log 2>&1; netgen -batch lvs '$netlist $TOP' '$gds $TOP' /PDK/sky130A/libs.tech/netgen/sky130A_setup.tcl lvs.log" || true
          python3 scripts/parse_drc_lvs.py drc.log lvs.log > drclvs.json

      # ---------------------------------------------------------------------
      # Aggregate into the single verification.json artifact the app polls
      # ---------------------------------------------------------------------
      - name: Build verification.json
        if: always()
        run: |
          set -euo pipefail
          python3 scripts/build_report.py \
            --design-id "$DESIGN_ID" \
            --top-module "$TOP" \
            --pdk "$PDK" \
            --agents "$AGENTS" \
            > verification.json
          cat verification.json | jq '.pass, (.agents | map({agent, pass, skipped}))'

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Name MUST match: verification-<design_id> where <design_id>
          # already starts with "verify-". The Vercel app looks up this
          # exact name in lib/verification/cloud-runner.ts.
          name: verification-${{ inputs.design_id }}
          path: verification.json
          retention-days: 7
